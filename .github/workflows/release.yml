name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create, for example v0.0.1
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-wheel:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
          - arch: arm64
            runs-on: macos-latest
          - arch: amd64
            runs-on: windows-latest

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate release version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          cargo = (root / "Cargo.toml").read_text()
          pyproject = (root / "pyproject.toml").read_text()
          release_tag = os.environ["RELEASE_TAG"]
          normalized_tag = release_tag[1:] if release_tag.startswith("v") else release_tag

          cargo_match = re.search(r'^version = "([^"]+)"$', cargo, re.MULTILINE)
          pyproject_match = re.search(r'^version = "([^"]+)"$', pyproject, re.MULTILINE)

          if cargo_match is None or pyproject_match is None:
            raise SystemExit("Could not determine package versions from Cargo.toml / pyproject.toml")

          cargo_version = cargo_match.group(1)
          pyproject_version = pyproject_match.group(1)

          # Normalize semver pre-release to PEP 440 for comparison:
          # 0.0.1-alpha.1 -> 0.0.1a1, 0.0.1-beta.2 -> 0.0.1b2, 0.0.1-rc.1 -> 0.0.1rc1
          def semver_to_pep440(v):
              v = re.sub(r'-alpha\.?(\d+)', r'a\1', v)
              v = re.sub(r'-beta\.?(\d+)', r'b\1', v)
              v = re.sub(r'-rc\.?(\d+)', r'rc\1', v)
              return v

          cargo_normalized = semver_to_pep440(cargo_version)

          if cargo_normalized != pyproject_version:
            raise SystemExit(
              f"Version mismatch: Cargo.toml={cargo_version} (normalized: {cargo_normalized}), pyproject.toml={pyproject_version}"
            )

          # Tag uses PEP 440 format (e.g. v0.0.1a1)
          if pyproject_version != normalized_tag:
            raise SystemExit(
              f"Release tag {release_tag} does not match pyproject.toml version {pyproject_version}"
            )
          PY

      - name: Install release build dependencies
        run: python -m pip install --upgrade pip numpy maturin

      - name: Build wheel
        env:
          PYO3_PYTHON: python
        run: maturin build --release --features python -o dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ runner.os }}-${{ matrix.arch }}-py312
          path: dist/*.whl
          if-no-files-found: error

  create-release:
    needs: build-wheel
    runs-on: ubuntu-latest

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          path: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mapfile -d '' assets < <(find release-assets -type f -name '*.whl' -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No wheel assets found under release-assets" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            mapfile -t existing_wheels < <(
              gh release view "$RELEASE_TAG" --json assets --jq '.assets[] | select(.name | endswith(".whl")) | .name'
            )

            for wheel in "${existing_wheels[@]}"; do
              gh release delete-asset "$RELEASE_TAG" "$wheel" --yes
            done

            gh release upload "$RELEASE_TAG" "${assets[@]}"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --target "${GITHUB_SHA}" \
              "${assets[@]}"
          fi

  deploy-pages:
    needs: create-release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Generate PEP 503 package index
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p _pages/simple/qwencandle

          {
            echo '<!DOCTYPE html><html><body>'
            gh release list --limit 100 --exclude-drafts --json tagName --jq '.[].tagName' | while read -r tag; do
              gh release view "$tag" --json assets --jq '.assets[] | select(.name | endswith(".whl")) | .name' | while read -r name; do
                echo "<a href=\"https://github.com/${GH_REPO}/releases/download/${tag}/${name}\">${name}</a><br>"
              done
            done
            echo '</body></html>'
          } > _pages/simple/qwencandle/index.html

          cat > _pages/simple/index.html <<'HTML'
          <!DOCTYPE html><html><body>
          <a href="qwencandle/">qwencandle</a>
          </body></html>
          HTML

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_pages'
      - id: deployment
        uses: actions/deploy-pages@v4
