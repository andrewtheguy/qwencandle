name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip numpy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-qwen3-asr-0.6b

      - name: Run Rust tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Transcribe JFK fixture
        run: |
          set -eo pipefail
          output=$(cat fixtures/jfk.wav | ./target/release/qwencandle)
          echo "Output: $output"
          echo "$output" | grep -qi "ask not what your country can do for you"

      - name: Build release binary (MKL)
        run: cargo build --release --features mkl

      - name: Transcribe JFK fixture (MKL)
        run: |
          set -eo pipefail
          output=$(cat fixtures/jfk.wav | ./target/release/qwencandle)
          echo "Output: $output"
          echo "$output" | grep -qi "ask not what your country can do for you"

      - name: Build Python extension
        env:
          PYO3_PYTHON: python
        run: cargo build --features python --lib

  test-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip numpy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-qwen3-asr-0.6b

      - name: Run Rust tests
        run: cargo test

      - name: Build with Metal + Accelerate
        run: cargo build --release --features metal,accelerate

      - name: Transcribe JFK fixture
        run: |
          set -eo pipefail
          output=$(cat fixtures/jfk.wav | ./target/release/qwencandle)
          echo "Output: $output"
          echo "$output" | grep -qi "ask not what your country can do for you"

      - name: Build Python extension
        env:
          PYO3_PYTHON: python
        run: cargo build --features python --lib
